<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — IDENTIT&Eacute; Therapeutics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Hanken+Grotesk:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0A0D;--bone:#EFE7D6;--bone-dim:#B8AE97;--gold:#C79A4F;--gold-deep:#9E7728;--olive:#6B7B3E;--error:#C45B4A;--success:#6B7B3E;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink);color:var(--bone);font-family:'Hanken Grotesk',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
  ::selection{background:var(--gold-deep);color:var(--bone);}

  .header{height:64px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0;}
  .header a.logo{text-decoration:none;display:flex;align-items:center;}
  .header a.logo img{height:56px;width:auto;}
  .header nav{display:flex;align-items:center;gap:24px;}
  .header nav a{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--bone-dim);text-decoration:none;transition:color .2s;}
  .header nav a:hover{color:var(--gold);}

  .container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;max-width:640px;margin:0 auto;width:100%;}

  .contact-box{width:100%;}
  .contact-box h1{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(32px,5vw,48px);margin-bottom:8px;line-height:1.05;}
  .contact-box .subtitle{font-size:15px;color:var(--bone-dim);margin-bottom:48px;}

  .field{margin-bottom:28px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--bone-dim);margin-bottom:10px;}
  .field input,.field textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:14px 16px;color:var(--bone);font-family:'Hanken Grotesk',sans-serif;font-size:15px;outline:none;transition:border-color .2s,background .2s;}
  .field input:focus,.field textarea:focus{border-color:var(--gold);background:rgba(255,255,255,.06);}
  .field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.2);}
  .field textarea{min-height:120px;resize:vertical;}

  .btn{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:16px;font-family:'Hanken Grotesk',sans-serif;font-weight:500;font-size:14px;cursor:pointer;transition:opacity .2s;letter-spacing:.02em;}
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  .error{color:var(--error);font-size:13px;margin-top:16px;padding:12px 16px;background:rgba(196,91,74,.08);border-radius:8px;display:none;}
  .error.show{display:block;}
  .success{color:#fff;font-size:14px;margin-top:16px;padding:16px;background:var(--success);border-radius:8px;display:none;text-align:center;}
  .success.show{display:block;}

  .info{margin-top:48px;padding-top:32px;border-top:1px solid rgba(255,255,255,.06);}
  .info-item{margin-bottom:20px;}
  .info-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--bone-dim);margin-bottom:6px;}
  .info-value{font-size:14px;color:var(--bone);opacity:.7;}
  .info-value a{color:var(--gold);text-decoration:none;}
  .info-value a:hover{opacity:.7;}

  @media(max-width:640px){
    .header{padding:0 16px;}
    .container{padding:32px 16px;}
  }
</style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo"><img src="/images/logo-white.png" alt="IDENTIT&Eacute;"></a>
    <nav>
      <a href="/">Site</a>
      <a href="/vault.html">Vault</a>
    </nav>
  </header>

  <div class="container">
    <div class="contact-box">
      <h1>Get in touch</h1>
      <p class="subtitle">Send us a message and we will get back to you.</p>

      <form id="contactForm">
        <div class="field">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name" required autocomplete="name">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="field">
          <label>Company</label>
          <input type="text" id="company" placeholder="Your company" autocomplete="organization">
        </div>
        <div class="field">
          <label>Message</label>
          <textarea id="message" placeholder="How can we help?" required></textarea>
        </div>
        <button type="submit" class="btn" id="submitBtn">Send Message</button>
        <div class="error" id="formError"></div>
        <div class="success" id="formSuccess">Message sent. We will be in touch soon.</div>
      </form>

      <div class="info">
        <div class="info-item">
          <div class="info-label">Email</div>
          <div class="info-value"><a href="mailto:linden@ucsb.edu">linden@ucsb.edu</a></div>
        </div>
        <div class="info-item">
          <div class="info-label">Location</div>
          <div class="info-value">Santa Barbara, California</div>
        </div>
      </div>
    </div>
  </div>

<script>
const API_URL = 'https://identite-api.lindendoss.workers.dev/api/trpc';

async function trpcMutate(path, input) {
  const res = await fetch(`${API_URL}/${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ json: input }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: { message: 'Network error' } }));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  return (await res.json()).result?.data?.json;
}

function showError(el, msg) { el.textContent = msg; el.classList.add('show'); }
function hideError(el) { el.classList.remove('show'); }

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('formError');
  const successEl = document.getElementById('formSuccess');
  hideError(errorEl); successEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    await trpcMutate('contact.submit', {
      name: document.getElementById('name').value.trim(),
      email: document.getElementById('email').value.trim(),
      company: document.getElementById('company').value.trim(),
      message: document.getElementById('message').value.trim(),
    });
    successEl.classList.add('show');
    document.getElementById('contactForm').reset();
  } catch (err) {
    showError(errorEl, err.message || 'Failed to send. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Message';
  }
});
</script>
</body>
</html>
